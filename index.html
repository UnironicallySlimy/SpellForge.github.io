</head>

  <script type="text/babel" data-type="module">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

// ════════════════════════════════════════════════════════════
// REGISTRY DEFAULTS
// ════════════════════════════════════════════════════════════

const DEF_SELECTIONS = [
  { id: "Self", name: "Self", desc: "Caster only", configFields: [] },
  { id: "Overlap", name: "Overlap", desc: "Physics query against stencil collider", configFields: [] },
  { id: "Nearest_N", name: "Nearest N", desc: "N nearest alive entities to origin", configFields: [{ key: "n", label: "N", type: "number" }] },
  { id: "Chain", name: "Chain", desc: "Hops from primary target", configFields: [{ key: "jumps", label: "Jumps", type: "number" }, { key: "range", label: "Range", type: "number" }] },

];

const DEF_SEL_MODS = [
  { id: "Enemies", name: "Enemies", desc: "Hostile only", configFields: [] },
  { id: "Allies", name: "Allies", desc: "Friendly only", configFields: [] },
  { id: "Any", name: "Any", desc: "All teams", configFields: [] },
  { id: "Exclude_Self", name: "Exclude Self", desc: "Removes caster", configFields: [] },
  { id: "Max", name: "Max", desc: "Cap results", configFields: [{ key: "n", label: "N", type: "number" }] },
  { id: "Sort", name: "Sort", desc: "Order results", configFields: [{ key: "mode", label: "Mode", type: "select", options: ["Nearest", "Furthest", "Lowest_Hp", "Highest_Hp"] }] },
];

const DEF_RESOLUTIONS = [
  { id: "Instant", name: "Instant", configFields: [
    { key: "delay", label: "Delay (s)", type: "number" },
  ] },
  {
    id: "Projectile", name: "Projectile", configFields: [
      { key: "speed", label: "Speed", type: "number" },
      { key: "travel", label: "Travel", type: "select", options: ["Linear", "Homing", "Arc"] },
      { key: "max_range", label: "Max Range", type: "number" },
      { key: "piercing", label: "Piercing", type: "checkbox" },
      { key: "pierce_count", label: "Pierce Count (-1 = Infinite)", type: "number", showWhen: { key: "piercing", value: "true" } },
      { key: "trigger_on_pierce", label: "Trigger On Pierce", type: "checkbox", showWhen: { key: "piercing", value: "true" } },
      { key: "aoe_on_impact", label: "AoE On Impact", type: "checkbox" },
      { key: "aoe_shape", label: "AoE Shape", type: "stencil", showWhen: { key: "aoe_on_impact", value: "true" } },
      { key: "aoe_scale", label: "AoE Scale", type: "number", showWhen: { key: "aoe_on_impact", value: "true" } },
    ],
  },
  {
    id: "Placeable", name: "Placeable", configFields: [
      { key: "duration", label: "Duration (s)", type: "number" },
      { key: "trigger", label: "Trigger", type: "select", options: ["Passive", "Pulse", "On_Enter"] },
      { key: "tick_rate", label: "Tick Rate (s)", type: "number", showWhen: { key: "trigger", value: "Pulse" } },
      { key: "activate_once", label: "Activate Once", type: "checkbox" },
      { key: "arm_time", label: "Arm Time (s)", type: "number" },

const DEF_KEYWORDS = [
  { id: "Damage", configFields: [{ key: "amount", label: "Amount", type: "text", ph: "5 + 3 * F" }, { key: "type", label: "Type", type: "element" }] },
  { id: "DoT", configFields: [{ key: "damage_per_tick", label: "Damage Per Tick", type: "text", ph: "2" }, { key: "duration", label: "Duration", type: "text", ph: "3" }, { key: "type", label: "Type", type: "element" }] },
  { id: "Slow", configFields: [{ key: "amount_pct", label: "Amount %", type: "text", ph: "30" }, { key: "duration", label: "Duration", type: "text", ph: "3" }] },
  { id: "Stun", configFields: [{ key: "duration", label: "Duration", type: "text", ph: "1.5" }] },
  { id: "Knockback", configFields: [{ key: "force", label: "Force", type: "text", ph: "4" }] },
  { id: "Pull", configFields: [{ key: "force", label: "Force", type: "text", ph: "4" }] },
  { id: "Root", configFields: [{ key: "duration", label: "Duration", type: "text", ph: "2" }] },
  { id: "Heal", configFields: [{ key: "amount", label: "Amount", type: "text", ph: "5 + 2 * E" }] },
  { id: "Shield", configFields: [{ key: "amount", label: "Amount", type: "text", ph: "10" }, { key: "duration", label: "Duration", type: "text", ph: "5" }] },
  { id: "Spawn", configFields: [{ key: "spell", label: "Spell", type: "spell" }] },
];

const DEF_SHAPES = ["Circle", "Cone", "Line"];
const EXCESS_OPS = ["add", "sub", "mul", "set"];
const EMPTY_REG = { elements: {}, targeters: {}, selections: {}, selMods: {}, resolutions: {}, keywords: {}, shapes: {} };

// ════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const objToArr = (obj) => obj ? Object.values(obj) : [];
const objKeys = (obj) => obj ? Object.keys(obj) : [];
const capitalize = (s) => s ? s.replace(/\b\w/g, (c) => c.toUpperCase()) : s;

function makeSpell() {
  return {
    id: uid(), name: "", orbs: {}, hasStencil: false,
    stencilShape: "circle", stencilScale: "1",
    targeter: "Self", targeterConfig: {},
    selStrategy: "Overlap", selConfig: {},
    selMods: [], selModConfigs: {},
    resolution: "Instant", config: {},
    keywords: [], excess: [], flavor: "", notes: "",
    section_notes: {},
  };
}

function toYaml(s, reg) {
  const L = [];
  L.push("- name: " + (s.name || "Unnamed"));
  const orbs = Object.entries(s.orbs || {}).filter(([, v]) => v > 0);
  if (orbs.length) L.push("  orbs: { " + orbs.map(([k, v]) => k + ": " + v).join(", ") + " }");
  if (s.hasStencil && s.stencilShape) L.push("  stencil: " + s.stencilShape + ", " + (s.stencilScale || 1));
  let t = s.targeter;
  const tCfg = Object.entries(s.targeterConfig || {}).filter(([, v]) => v !== "" && v != null);
  if (tCfg.length) t += "(" + tCfg.map(([k, v]) => k + "=" + v).join(", ") + ")";
  L.push("  targeter: " + t);
  let sel = s.selStrategy;
  const sCfg = Object.entries(s.selConfig || {}).filter(([, v]) => v !== "" && v != null);
  if (sCfg.length) sel += "(" + sCfg.map(([k, v]) => k + "=" + v).join(", ") + ")";
  for (const m of s.selMods || []) {
    const md = reg.selMods.find((x) => x.id === m);
    const mCfg = Object.entries((s.selModConfigs && s.selModConfigs[m]) || {}).filter(([, v]) => v !== "" && v != null);
    if (mCfg.length) sel += " + " + m + "(" + mCfg.map(([k, v]) => k + "=" + v).join(", ") + ")";
    else sel += " + " + m;
  }
  L.push("  selection: " + sel);
  L.push("  resolution: " + s.resolution);
  const cfg = Object.entries(s.config || {}).filter(([, v]) => v !== "" && v != null);
  if (cfg.length) { L.push("  config:"); cfg.forEach(([k, v]) => L.push("    " + k + ": " + v)); }
  if (s.keywords && s.keywords.length) {
    L.push("  keywords:");
    s.keywords.forEach((kw) => {
      const pp = Object.entries(kw.config || {}).filter(([, v]) => v !== "").map(([k, v]) => k + "=" + v).join(", ");
      let line = kw._keyword_type + "(" + pp + ")";
      if (kw.tick) line += " + Tick(" + kw.tick + ")";
      if (kw.chance) line += " + Chance(" + kw.chance + ")";
      L.push("    - " + line);
    });
  }
  const exc = (s.excess || []).filter((e) => e.ops && e.ops.length > 0);
  if (exc.length) {
    L.push("  excess:");
    exc.forEach((e) => {
      const ops = e.ops.map((o) => o.op + " " + o.target + " " + o.scalar).join(" + ");
      L.push("    " + e.element + ": " + ops);
    });
  }
  if (s.flavor) L.push('  flavor: "' + s.flavor + '"');
  if (s.notes) {
    L.push("  notes: |");
    s.notes.split("\n").forEach((line) => L.push("    " + line));
  }
  const sn = s.section_notes || {};
  Object.keys(sn).filter((k) => sn[k]).forEach((k) => {
    L.push("  # [" + k + "] " + sn[k].replace(/\n/g, " "));
  });

  return L.join("\n");
}

// ════════════════════════════════════════════════════════════
// STYLES
// ════════════════════════════════════════════════════════════

const C = {
  bg: "#080b10", surface: "#0f1319", surface2: "#161c25", surface3: "#1c2430",
  border: "#252e3b", borderLight: "#2f3b4d", text: "#c5cdd8", textDim: "#6b7a8d",
  accent: "#d4954a", accentDim: "#a06e2e", danger: "#c94444", success: "#3d9e6b",
};
const css = {
  input: { background: C.surface2, border: "1px solid " + C.border, borderRadius: 4, color: C.text, padding: "5px 8px", fontSize: 13, outline: "none", width: "100%", fontFamily: "inherit" },
  select: { background: C.surface2, border: "1px solid " + C.border, borderRadius: 4, color: C.text, padding: "5px 8px", fontSize: 13, outline: "none", fontFamily: "inherit", cursor: "pointer" },
  btn: { background: C.surface3, border: "1px solid " + C.border, borderRadius: 4, color: C.text, padding: "5px 12px", fontSize: 12, cursor: "pointer", fontFamily: "inherit" },
  btnAccent: { background: C.accentDim, border: "1px solid " + C.accent, borderRadius: 4, color: "#fff", padding: "5px 14px", fontSize: 12, cursor: "pointer", fontFamily: "inherit" },
  btnDanger: { background: "transparent", border: "none", color: C.danger, cursor: "pointer", fontSize: 16, padding: "2px 6px", fontFamily: "inherit" },
  section: { marginBottom: 16, padding: 12, background: C.surface, borderRadius: 6, border: "1px solid " + C.border },
  sectionTitle: { fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: C.accent, marginBottom: 8, display: "flex", alignItems: "center", gap: 6 },
  row: { display: "flex", gap: 8, alignItems: "center", marginBottom: 6 },

// ════════════════════════════════════════════════════════════
// MAIN COMPONENT
// ════════════════════════════════════════════════════════════

function SpellForge() {
  // ── Firebase state ──
  const [fbConfig, setFbConfig] = useState(null);
  const [connected, setConnected] = useState(false);
  const [showSetup, setShowSetup] = useState(false);
  const [configInput, setConfigInput] = useState("");
  const [configError, setConfigError] = useState("");
  const dbRef = useRef(null);

  // ── App state ──
  const [spells, setSpells] = useState([]);
  const [draft, setDraft] = useState(makeSpell);
  const [selectedId, setSelectedId] = useState(null);
  const [view, setView] = useState("editor");
  const [regTab, setRegTab] = useState("elements");
  const [toast, setToast] = useState(null);
  const [customReg, setCustomReg] = useState(EMPTY_REG);
  const [removedDefs, setRemovedDefs] = useState(EMPTY_REG);
  const [showRemoved, setShowRemoved] = useState(false);
  const [configOpts, setConfigOpts] = useState({});
  const [customFields, setCustomFields] = useState({});
  const [removedFields, setRemovedFields] = useState({});
  const [expandedRes, setExpandedRes] = useState(null);
  const [expandedField, setExpandedField] = useState(null);
  const [editingField, setEditingField] = useState(null);
  const [editFieldData, setEditFieldData] = useState({});
  const [newOptInput, setNewOptInput] = useState({});
  const [newFieldInput, setNewFieldInput] = useState({});
  const listenersRef = useRef(false);

  const reg = useMemo(() => {
    const removedCats = (cat) => objKeys(removedDefs[cat] || {});
    const filterDef = (arr, cat) => arr.filter((x) => !removedCats(cat).includes(x.id || x));
    const mergeFields = (items) => items.map((item) => {
      const overrides = customFields[item.id] || {};
      const removedFlds = removedFields[item.id] || {};
      const baseFields = (item.configFields || [])
        .filter((f) => !removedFlds[f.key])
        .map((f) => overrides[f.key] ? { ...f, ...overrides[f.key] } : f);
      const newFields = objToArr(overrides).filter((f) => !(item.configFields || []).some((df) => df.key === f.key) && !removedFlds[f.key]);
      return { ...item, configFields: [...baseFields, ...newFields] };
    });
    return {
      elements: [...filterDef(DEF_ELEMENTS, "elements"), ...objToArr(customReg.elements)],
      targeters: mergeFields([...filterDef(DEF_TARGETERS, "targeters"), ...objToArr(customReg.targeters)]),
      selections: mergeFields([...filterDef(DEF_SELECTIONS, "selections"), ...objToArr(customReg.selections)]),
      selMods: mergeFields([...filterDef(DEF_SEL_MODS, "selMods"), ...objToArr(customReg.selMods)]),
      resolutions: mergeFields([...filterDef(DEF_RESOLUTIONS, "resolutions"), ...objToArr(customReg.resolutions)]),
      keywords: mergeFields([...filterDef(DEF_KEYWORDS, "keywords"), ...objToArr(customReg.keywords)]),
      shapes: [...filterDef(DEF_SHAPES, "shapes"), ...objKeys(customReg.shapes)],
    };
  }, [customReg, removedDefs, customFields, removedFields]);

  const flash = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2000); };

  // ── Firebase init ──
  const initFirebase = useCallback((cfg) => {
    try {
      if (!firebase.apps.length) firebase.initializeApp(cfg);
      dbRef.current = firebase.database();
      setConnected(true);
      setFbConfig(cfg);
      localStorage.setItem("spellforge:fbconfig", JSON.stringify(cfg));

      if (!listenersRef.current) {
        listenersRef.current = true;

        // Listen to spells
        dbRef.current.ref("spellforge/spells").on("value", (snap) => {
          const data = snap.val();
          const arr = data ? Object.values(data) : [];
          // Firebase strips empty arrays/objects, so sanitize
          const clean = arr.map((s) => ({
            ...makeSpell(), ...s,
            targeter: capitalize((s.targeter || "Self").replace(/_/g, "_")),
            selStrategy: capitalize((s.selStrategy || "Overlap").replace(/_/g, "_")),
            resolution: (() => { let r = capitalize((s.resolution || "Instant").replace(/_/g, "_")); return r === "Animation_Trigger" ? "Instant" : r; })(),
            orbs: s.orbs || {},
            selMods: (s.selMods || []).map((m) => capitalize(m)),
            targeterConfig: s.targeterConfig || (s.targeterRange ? { range: s.targeterRange } : {}),
            selConfig: s.selConfig || s.selParams || {},
            selModConfigs: s.selModConfigs || (s.selModParams ? Object.fromEntries(Object.entries(s.selModParams).map(([k, v]) => [k, { n: v }])) : {}),
            config: s.config || {},
            keywords: (s.keywords || []).map((k) => ({ ...k, _keyword_type: k._keyword_type || k.type || "Damage", config: k.config || k.params || {} })),
            excess: (s.excess || []).map((e) => ({ ...e, ops: e.ops || [] })),
            section_notes: s.section_notes || {},
          }));
          setSpells(clean);
        });

        // Listen to custom registry
        dbRef.current.ref("spellforge/customRegistry").on("value", (snap) => {
          const data = snap.val();
          if (data) {
            setCustomReg({
              elements: data.elements || {},
              targeters: data.targeters || {},
              selections: data.selections || {},
              selMods: data.selMods || {},
              resolutions: data.resolutions || {},
              keywords: data.keywords || {},
              shapes: data.shapes || {},
            });
          } else {
            setCustomReg(EMPTY_REG);
          }
        });

        // Listen to removed defaults
        dbRef.current.ref("spellforge/removedDefaults").on("value", (snap) => {
          const data = snap.val();
          if (data) {
            setRemovedDefs({
              elements: data.elements || {},
              targeters: data.targeters || {},
              selections: data.selections || {},
              selMods: data.selMods || {},
              resolutions: data.resolutions || {},
              keywords: data.keywords || {},
              shapes: data.shapes || {},
            });
          } else {
            setRemovedDefs(EMPTY_REG);
          }
        });

        // Listen to custom config field options (e.g. new travel types for projectile)
        dbRef.current.ref("spellforge/configOptions").on("value", (snap) => {
          setConfigOpts(snap.val() || {});
        });

        // Listen to custom config fields added to items
        dbRef.current.ref("spellforge/customFields").on("value", (snap) => {
          setCustomFields(snap.val() || {});
        });

        // Listen to removed fields
        dbRef.current.ref("spellforge/removedFields").on("value", (snap) => {
          setRemovedFields(snap.val() || {});
        });
      }
    } catch (e) {
      setConfigError("Failed to connect: " + e.message);
      setConnected(false);
    }
  }, []);

  // Check for saved config on mount
  useEffect(() => {
    const saved = localStorage.getItem("spellforge:fbconfig");
    if (saved) {
      try { initFirebase(JSON.parse(saved)); }
      catch { setShowSetup(true); }
    } else {
      setShowSetup(true);
    }
  }, [initFirebase]);

  const saveConfig = () => {
    setConfigError("");
    try {
      // Handle pasted config - try to extract the object
      let input = configInput.trim();
      // Strip surrounding JS if they pasted the full snippet
      const match = input.match(/\{[\s\S]*\}/);
      if (match) input = match[0];
      // Make it valid JSON (Firebase console gives JS object syntax with unquoted keys)
      // Only quote keys at the start of lines to avoid breaking colons inside string values
      input = input.split('\n').map(function(line) {
        return line.replace(/^\s*([a-zA-Z_][a-zA-Z0-9_]*)\s*:/, function(m, key) {
          return m.replace(key, '"' + key + '"');
        });
      }).join('\n');
      input = input.replace(/,\s*}/g, '}');
      const cfg = JSON.parse(input);
      if (!cfg.databaseURL && !cfg.projectId) {
        setConfigError("Missing databaseURL or projectId. Make sure you copied the full config.");
        return;
      }
      initFirebase(cfg);
      setShowSetup(false);
      flash("Connected to Firebase!");
    } catch (e) {
      setConfigError("Invalid config JSON: " + e.message);
    }
  };

  // ── Firebase writes ──
  const fbSet = (path, data) => { if (dbRef.current) dbRef.current.ref(path).set(data); };
  const fbRemove = (path) => { if (dbRef.current) dbRef.current.ref(path).remove(); };

  // ── Spell ops ──
  const newSpell = () => { const s = makeSpell(); setDraft(s); setSelectedId(null); setView("editor"); };
  const selectSpell = (s) => { setDraft(JSON.parse(JSON.stringify(s))); setSelectedId(s.id); setView("editor"); };
  const deleteSpell = (id) => {
    fbRemove("spellforge/spells/" + id);
    if (selectedId === id) newSpell();
  };
  const duplicateSpell = (s) => {
    const dup = { ...JSON.parse(JSON.stringify(s)), id: uid(), name: s.name + " (copy)" };
    fbSet("spellforge/spells/" + dup.id, dup);
    setDraft(dup); setSelectedId(dup.id);
  };
  const saveSpell = () => {
    const toSave = { ...draft, name: capitalize(draft.name) };
    // Capitalize config values
    const cleanConfig = {};
    Object.entries(toSave.config || {}).forEach(([k, v]) => {
      cleanConfig[k] = (typeof v === "string" && v !== "true" && v !== "") ? capitalize(v) : v;
    });
    toSave.config = cleanConfig;
    // Capitalize keyword param values
    toSave.keywords = (toSave.keywords || []).map((kw) => {
      const config = {};
      Object.entries(kw.config || {}).forEach(([k, v]) => { config[k] = (typeof v === "string" && v !== "") ? capitalize(v) : v; });
      return { ...kw, config };
    });
    setDraft(toSave);
    fbSet("spellforge/spells/" + toSave.id, toSave);
    setSelectedId(toSave.id);
    flash("Spell saved!");
  };

  // ── Draft helpers ──
  const up = (f, v) => setDraft((d) => ({ ...d, [f]: v }));
  const upOrb = (el, delta) => {
    setDraft((d) => {
      const orbs = { ...d.orbs }; orbs[el] = Math.max(0, (orbs[el] || 0) + delta);
      if (orbs[el] === 0) delete orbs[el]; return { ...d, orbs };
    });
  };
  const upConfig = (k, v) => setDraft((d) => ({ ...d, config: { ...d.config, [k]: v } }));
  const upSectionNote = (section, val) => setDraft((d) => ({ ...d, section_notes: { ...d.section_notes, [section]: val } }));

  // Reusable inline notes for each section
  const SectionNote = ({ section }) => {
    const val = (draft.section_notes && draft.section_notes[section]) || "";
    const hasNote = val.length > 0;
    return (
      <div style={{ marginTop: 6 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 4, cursor: "pointer", fontSize: 10, color: hasNote ? C.accent : C.textDim }}
          onClick={() => {
            const el = document.getElementById("note_" + section);
            if (el) el.style.display = el.style.display === "none" ? "block" : "none";
          }}>
          <span>{hasNote ? "▾" : "▸"}</span>
          <span>{hasNote ? "Notes" : "Add note..."}</span>
        </div>
        <textarea id={"note_" + section} style={{
          ...css.input, display: hasNote ? "block" : "none", marginTop: 4,
          minHeight: 36, resize: "vertical", fontFamily: "inherit", fontSize: 11,
          lineHeight: 1.4, color: C.textDim,
        }} value={val} onChange={(e) => upSectionNote(section, e.target.value)}
          placeholder="Implementation notes for this section..." />
      </div>
    );
  };
  const toggleMod = (id) => setDraft((d) => ({ ...d, selMods: d.selMods.includes(id) ? d.selMods.filter((m) => m !== id) : [...d.selMods, id] }));
  const upTargeterConfig = (k, v) => setDraft((d) => ({ ...d, targeterConfig: { ...d.targeterConfig, [k]: v } }));
  const upSelConfig = (k, v) => setDraft((d) => ({ ...d, selConfig: { ...d.selConfig, [k]: v } }));
  const upSelModConfig = (modId, key, val) => setDraft((d) => ({ ...d, selModConfigs: { ...d.selModConfigs, [modId]: { ...(d.selModConfigs && d.selModConfigs[modId] || {}), [key]: val } } }));

  const addKeyword = () => {
    const kw = reg.keywords[0]; const config = {};
    if (kw.configFields) kw.configFields.forEach((f) => (config[f.key] = ""));
    setDraft((d) => ({ ...d, keywords: [...d.keywords, { _keyword_type: kw.id, config, chance: "", tick: "" }] }));
  };
  const removeKeyword = (i) => setDraft((d) => ({ ...d, keywords: d.keywords.filter((_, j) => j !== i) }));
  const upKeyword = (i, field, val) => {
    setDraft((d) => {
      const kws = [...d.keywords];
      if (field === "_keyword_type") {
        const def = reg.keywords.find((k) => k.id === val); const config = {};
        if (def && def.configFields) def.configFields.forEach((f) => (config[f.key] = ""));
        kws[i] = { ...kws[i], _keyword_type: val, config };
      } else if (field === "chance") kws[i] = { ...kws[i], chance: val };
      else if (field === "tick") kws[i] = { ...kws[i], tick: val };
      else kws[i] = { ...kws[i], config: { ...kws[i].config, [field]: val } };
      return { ...d, keywords: kws };
    });
  };

  const addExcess = () => setDraft((d) => ({ ...d, excess: [...d.excess, { element: reg.elements[0]?.id || "F", ops: [{ op: "add", target: "", scalar: "" }] }] }));
  const removeExcess = (i) => setDraft((d) => ({ ...d, excess: d.excess.filter((_, j) => j !== i) }));
  const upExcess = (i, f, v) => setDraft((d) => { const e = [...d.excess]; e[i] = { ...e[i], [f]: v }; return { ...d, excess: e }; });
  const addExcessOp = (i) => setDraft((d) => { const e = [...d.excess]; e[i] = { ...e[i], ops: [...e[i].ops, { op: "add", target: "", scalar: "" }] }; return { ...d, excess: e }; });
  const removeExcessOp = (ei, oi) => setDraft((d) => { const e = [...d.excess]; e[ei] = { ...e[ei], ops: e[ei].ops.filter((_, j) => j !== oi) }; return { ...d, excess: e }; });
  const upExcessOp = (ei, oi, f, v) => setDraft((d) => { const e = [...d.excess]; const ops = [...e[ei].ops]; ops[oi] = { ...ops[oi], [f]: v }; e[ei] = { ...e[ei], ops }; return { ...d, excess: e }; });

  // Order fields so children appear immediately after their parent
  const orderFields = (fields) => {
    if (!fields || !fields.length) return fields || [];
    const ordered = [];
    const addWithChildren = (parent) => {
      ordered.push(parent);
      fields.filter((f) => f.showWhen && f.showWhen.key === parent.key).forEach((child) => addWithChildren(child));
    };
    fields.filter((f) => !f.showWhen).forEach((f) => addWithChildren(f));
    fields.forEach((f) => { if (!ordered.includes(f)) ordered.push(f); });
    return ordered;
  };

  const getFieldDepth = (f, fields) => {
    let d = 0, cur = f;
    while (cur && cur.showWhen) { d++; cur = fields.find((p) => p.key === cur.showWhen.key); }
    return d;
  };

  // Reusable config field renderer
  const renderConfigFields = (fields, configObj, updateFn, resId) => {
    if (!fields || !fields.length) return null;
    const ordered = orderFields(fields);
    const visible = ordered.filter((f) => !f.showWhen || configObj[f.showWhen.key] === f.showWhen.value);
    if (!visible.length) return null;
    return visible.map((f) => {
      const depth = getFieldDepth(f, fields);
      return (
      <div key={f.key} style={{ ...css.row, marginLeft: depth * 16 }}>
        <span style={{ ...css.label, minWidth: 90 }}>{depth > 0 && <span style={{ color: C.accent, marginRight: 4, fontSize: 10 }}>↳</span>}{f.label || f.key}</span>
        {f.type === "checkbox" ? (
          <label style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", flex: 1 }}>
            <input type="checkbox" checked={configObj[f.key] === "true" || configObj[f.key] === true} onChange={(e) => updateFn(f.key, e.target.checked ? "true" : "")} />
            <span style={{ fontSize: 12, color: configObj[f.key] === "true" || configObj[f.key] === true ? C.text : C.textDim }}>
              {configObj[f.key] === "true" || configObj[f.key] === true ? "Yes" : "No"}
            </span>
          </label>
        ) : f.type === "stencil" ? (
          <select style={{ ...css.select, flex: 1 }} value={configObj[f.key] || ""} onChange={(e) => updateFn(f.key, e.target.value)} onKeyDown={(e) => e.stopPropagation()}>
            <option value="">—</option>
            {reg.shapes.map((s) => <option key={s} value={s}>{s}</option>)}
          </select>
        ) : f.type === "element" ? (
          <select style={{ ...css.select, flex: 1 }} value={configObj[f.key] || ""} onChange={(e) => updateFn(f.key, e.target.value)} onKeyDown={(e) => e.stopPropagation()}>
            <option value="">—</option>
            {reg.elements.map((el) => <option key={el.id} value={el.name}>{el.name}</option>)}
          </select>
        ) : f.type === "spell" ? (
          <select style={{ ...css.select, flex: 1 }} value={configObj[f.key] || ""} onChange={(e) => updateFn(f.key, e.target.value)} onKeyDown={(e) => e.stopPropagation()}>
            <option value="">—</option>
            {spells.filter((s) => s.name).map((s) => <option key={s.id} value={s.name}>{s.name}</option>)}
          </select>
        ) : f.type === "select" ? (
          <div style={{ flex: 1, position: "relative" }}>
            <input list={"dl_" + (resId || "") + "_" + f.key} style={{ ...css.input }} value={configObj[f.key] || ""} onChange={(e) => updateFn(f.key, e.target.value)} placeholder="Type or select..." onKeyDown={(e) => e.stopPropagation()} />
            <datalist id={"dl_" + (resId || "") + "_" + f.key}>
              {getFieldOptions(resId || "", f.key, f.options).map((o) => <option key={o} value={o} />)}
            </datalist>
          </div>
        ) : <input style={{ ...css.input, flex: 1 }} type={f.type || "text"} placeholder={f.ph || f.placeholder || ""} value={configObj[f.key] || ""} onChange={(e) => updateFn(f.key, e.target.value)} onKeyDown={(e) => e.stopPropagation()} />}
      </div>
    ); });
  };

  const exportAll = () => { navigator.clipboard.writeText(spells.map((s) => toYaml(s, reg)).join("\n\n")).then(() => flash("Copied!")); };
  const exportFile = () => {
    const blob = new Blob([spells.map((s) => toYaml(s, reg)).join("\n\n")], { type: "text/yaml" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "spells.yaml"; a.click();
    flash("Downloaded!");
  };

  const yaml = useMemo(() => toYaml(draft, reg), [draft, reg]);
  const resDef = reg.resolutions.find((r) => r.id === draft.resolution);
  const selDef = reg.selections.find((s) => s.id === draft.selStrategy);
  const targeterDef = reg.targeters.find((t) => t.id === draft.targeter);

  // ── Registry ops (write to Firebase) ──
  const [regForm, setRegForm] = useState({});
  const DEF_LOOKUP = { elements: DEF_ELEMENTS, targeters: DEF_TARGETERS, selections: DEF_SELECTIONS, selMods: DEF_SEL_MODS, resolutions: DEF_RESOLUTIONS, keywords: DEF_KEYWORDS, shapes: DEF_SHAPES };
  const isDefault = (cat, id) => cat === "shapes" ? DEF_SHAPES.includes(id) : (DEF_LOOKUP[cat] || []).some((x) => x.id === id);

  const addRegItem = (cat) => {
    if (!regForm[cat] || !regForm[cat].id) return;
    const item = { ...regForm[cat], id: capitalize(regForm[cat].id), name: capitalize(regForm[cat].name || "") };
    if (cat === "keywords") {
      item.configFields = (item.paramStr || "").split(",").filter(Boolean).map((p) => ({ key: p.trim(), label: capitalize(p.trim()), type: "text" }));
      delete item.paramStr;
    }
    if (cat === "selections" || cat === "targeters" || cat === "resolutions" || cat === "selMods") {
      item.configFields = (item.paramStr || "").split(",").filter(Boolean).map((p) => ({ key: p.trim(), label: capitalize(p.trim()), type: "number" }));
      delete item.paramStr;
    }
    fbSet("spellforge/customRegistry/" + cat + "/" + item.id, item);
    setRegForm((f) => ({ ...f, [cat]: {} }));
    flash("Added!");
  };

  const removeRegItem = (cat, id) => {
    if (isDefault(cat, id)) {
      // Soft-delete: track in removedDefaults
      fbSet("spellforge/removedDefaults/" + cat + "/" + id, true);
    } else {
      // Hard-delete custom items
      fbRemove("spellforge/customRegistry/" + cat + "/" + id);
    }
    flash("Removed!");
  };

  const restoreDefault = (cat, id) => {
    fbRemove("spellforge/removedDefaults/" + cat + "/" + id);
    flash("Restored!");
  };

  const addShape = (name) => { if (!name) return; fbSet("spellforge/customRegistry/shapes/" + capitalize(name), true); };

  // Get removed defaults for display
  const getRemovedItems = (cat) => {
    const ids = objKeys(removedDefs[cat] || {});
    if (cat === "shapes") return ids.filter((id) => DEF_SHAPES.includes(id));
    return (DEF_LOOKUP[cat] || []).filter((x) => ids.includes(x.id));
  };

  // Config field options: merge defaults with custom from Firebase
  const getFieldOptions = (resId, fieldKey, defaultOpts) => {
    const custom = objKeys((configOpts[resId] && configOpts[resId][fieldKey]) || {});
    return [...(defaultOpts || []), ...custom.filter((c) => !(defaultOpts || []).includes(c))];
  };
  const addConfigOption = (resId, fieldKey, value) => {
    if (!value) return;
    fbSet("spellforge/configOptions/" + resId + "/" + fieldKey + "/" + capitalize(value), true);
    flash("Option added!");
  };
  const removeConfigOption = (resId, fieldKey, value) => {
    fbRemove("spellforge/configOptions/" + resId + "/" + fieldKey + "/" + value);
    flash("Option removed!");
  };

  // Custom field management
  const FIELD_TYPES = ["number", "text", "select", "checkbox", "stencil", "element", "spell"];

  const addCustomField = (itemId, field) => {
    if (!field.key) return;
    fbSet("spellforge/customFields/" + itemId + "/" + field.key, field);
    flash("Field added!");
  };

  const editField = (itemId, fieldKey, updates) => {
    fbSet("spellforge/customFields/" + itemId + "/" + fieldKey, updates);
    flash("Field updated!");
  };

  const removeField = (itemId, fieldKey, isDefault) => {
    if (isDefault) {
      // Soft-delete default field
      fbSet("spellforge/removedFields/" + itemId + "/" + fieldKey, true);
      // Also remove any overrides
      fbRemove("spellforge/customFields/" + itemId + "/" + fieldKey);
    } else {
      fbRemove("spellforge/customFields/" + itemId + "/" + fieldKey);
    }
    flash("Field removed!");
  };

  const restoreField = (itemId, fieldKey) => {
    fbRemove("spellforge/removedFields/" + itemId + "/" + fieldKey);
    flash("Field restored!");
  };

  const isDefaultField = (itemId, fieldKey) => {
    // Check if this field exists in the original DEF_ arrays
    const allDefs = [...DEF_TARGETERS, ...DEF_SELECTIONS, ...DEF_SEL_MODS, ...DEF_RESOLUTIONS, ...DEF_KEYWORDS];
    const item = allDefs.find((d) => d.id === itemId);
    return item && item.configFields && item.configFields.some((f) => f.key === fieldKey);
  };

  const isFieldOverridden = (itemId, fieldKey) => !!(customFields[itemId] && customFields[itemId][fieldKey]);
  const isFieldRemoved = (itemId, fieldKey) => !!(removedFields[itemId] && removedFields[itemId][fieldKey]);
  const getRemovedFieldsForItem = (itemId) => objKeys(removedFields[itemId] || {});

  const getDefaultFieldDef = (itemId, fieldKey) => {
    const allDefs = [...DEF_TARGETERS, ...DEF_SELECTIONS, ...DEF_SEL_MODS, ...DEF_RESOLUTIONS, ...DEF_KEYWORDS];
    const item = allDefs.find((d) => d.id === itemId);
    return item && item.configFields && item.configFields.find((f) => f.key === fieldKey);
  };

  // ════════════════════════════════════════════════════════════
  // SETUP MODAL
  // ════════════════════════════════════════════════════════════

  if (showSetup && !connected) return (
    <div style={{ fontFamily: "'Segoe UI', system-ui, sans-serif", background: C.bg, color: C.text, height: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ width: 520, padding: 32, background: C.surface, borderRadius: 12, border: "1px solid " + C.border }}>
        <h1 style={{ fontSize: 20, fontWeight: 800, color: C.accent, letterSpacing: "0.08em", marginBottom: 8 }}>SPELL FORGE</h1>
        <p style={{ color: C.textDim, fontSize: 13, marginBottom: 20, lineHeight: 1.6 }}>
          Connect to Firebase for shared spell storage. Your designer will see every change in real time.
        </p>

        <div style={{ background: C.surface2, borderRadius: 6, padding: 16, marginBottom: 16, fontSize: 12, color: C.textDim, lineHeight: 1.8 }}>
          <strong style={{ color: C.text }}>Quick setup (2 min):</strong><br/>
          1. Go to <a href="https://console.firebase.google.com" target="_blank" style={{ color: C.accent }}>console.firebase.google.com</a><br/>
          2. Create a project (disable Google Analytics if asked)<br/>
          3. Click the web icon {"</>"} to add a web app — copy the <code style={{ color: C.accent }}>firebaseConfig</code> object<br/>
          4. In the sidebar go to Build → Realtime Database → Create Database<br/>
          5. Choose a region, start in <strong>test mode</strong><br/>
          6. Paste the config below
        </div>

        <textarea style={{
          ...css.input, height: 140, fontFamily: "monospace", fontSize: 12, resize: "vertical",
          marginBottom: 8,
        }}
          placeholder={'Paste your firebaseConfig here, e.g.:\n{\n  apiKey: "AI...",\n  authDomain: "my-project.firebaseapp.com",\n  databaseURL: "https://my-project-default-rtdb.firebaseio.com",\n  projectId: "my-project",\n  ...\n}'}
          value={configInput} onChange={(e) => setConfigInput(e.target.value)}
        />

        {configError && <div style={{ color: C.danger, fontSize: 12, marginBottom: 8 }}>{configError}</div>}

        <button style={{ ...css.btnAccent, width: "100%", padding: "10px", fontSize: 14 }} onClick={saveConfig}>
          Connect
        </button>
      </div>
    </div>
  );

  // ════════════════════════════════════════════════════════════
  // MAIN RENDER
  // ════════════════════════════════════════════════════════════

  return (
    <div style={{ fontFamily: "'Segoe UI', system-ui, sans-serif", background: C.bg, color: C.text, height: "100vh", display: "flex", flexDirection: "column", fontSize: 13, overflow: "hidden" }}>

      {toast && <div style={{ position: "fixed", top: 16, right: 16, zIndex: 999, padding: "8px 16px", background: C.accent, color: "#000", borderRadius: 6, fontSize: 12, fontWeight: 600, animation: "fadeIn 0.2s" }}>{toast}</div>}

      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 16px", background: C.surface, borderBottom: "1px solid " + C.border, flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 15, fontWeight: 800, letterSpacing: "0.1em", color: C.accent }}>SPELL FORGE</span>
          <div style={{ display: "flex", gap: 2 }}>
            <button style={{ ...css.btn, background: view === "editor" ? C.surface3 : "transparent", borderColor: view === "editor" ? C.borderLight : "transparent" }} onClick={() => setView("editor")}>Designer</button>
            <button style={{ ...css.btn, background: view === "registry" ? C.surface3 : "transparent", borderColor: view === "registry" ? C.borderLight : "transparent" }} onClick={() => setView("registry")}>Registry</button>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: connected ? C.success : C.danger }}>
            <span style={{ width: 7, height: 7, borderRadius: "50%", background: connected ? C.success : C.danger, display: "inline-block", animation: connected ? "none" : "pulse 1.5s infinite" }} />
            {connected ? "Synced" : "Offline"}
          </div>
          <button style={{ ...css.btn, fontSize: 11, padding: "3px 8px" }} onClick={() => setShowSetup(true)} title="Firebase settings">⚙</button>
          <button style={css.btn} onClick={exportAll}>Copy YAML</button>
          <button style={css.btn} onClick={exportFile}>Download .yaml</button>
        </div>
      </div>

      {/* Config modal overlay */}
      {showSetup && connected && (
        <div style={{ position: "fixed", inset: 0, zIndex: 100, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center" }}
          onClick={(e) => { if (e.target === e.currentTarget) setShowSetup(false); }}>
          <div style={{ width: 460, padding: 24, background: C.surface, borderRadius: 10, border: "1px solid " + C.border }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <span style={{ fontWeight: 700, color: C.accent }}>Firebase Config</span>
              <button style={css.btnDanger} onClick={() => setShowSetup(false)}>×</button>
            </div>
            <textarea style={{ ...css.input, height: 120, fontFamily: "monospace", fontSize: 11, marginBottom: 8 }}
              value={configInput || JSON.stringify(fbConfig, null, 2)} onChange={(e) => setConfigInput(e.target.value)} />
            {configError && <div style={{ color: C.danger, fontSize: 12, marginBottom: 8 }}>{configError}</div>}
            <div style={{ display: "flex", gap: 8 }}>
              <button style={css.btnAccent} onClick={saveConfig}>Reconnect</button>
              <button style={{ ...css.btn, color: C.danger }} onClick={() => { localStorage.removeItem("spellforge:fbconfig"); location.reload(); }}>Disconnect</button>
            </div>
          </div>
        </div>
      )}

      <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>

        {/* Spell List */}
        <div style={{ width: 180, background: C.surface, borderRight: "1px solid " + C.border, display: "flex", flexDirection: "column", flexShrink: 0 }}>
          <div style={{ padding: "8px 10px", borderBottom: "1px solid " + C.border }}>
            <button style={{ ...css.btnAccent, width: "100%", fontSize: 12, padding: "6px" }} onClick={newSpell}>+ New Spell</button>
          </div>
          <div style={{ flex: 1, overflowY: "auto" }}>
            {spells.map((s) => (
              <div key={s.id} onClick={() => selectSpell(s)} style={{
                padding: "8px 10px", cursor: "pointer", fontSize: 12,
                background: s.id === selectedId ? C.surface2 : "transparent",
                borderLeft: s.id === selectedId ? "2px solid " + C.accent : "2px solid transparent",
                display: "flex", justifyContent: "space-between", alignItems: "center",
              }}>
                <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1 }}>{s.name || "Unnamed"}</span>
                <div style={{ display: "flex", gap: 2, flexShrink: 0 }}>
                  <button style={{ ...css.btnDanger, fontSize: 11, padding: "0 3px" }} title="Duplicate" onClick={(e) => { e.stopPropagation(); duplicateSpell(s); }}>⧉</button>
                  <button style={{ ...css.btnDanger, fontSize: 13, padding: "0 3px" }} title="Delete" onClick={(e) => { e.stopPropagation(); deleteSpell(s.id); }}>×</button>
                </div>
              </div>
            ))}
            {spells.length === 0 && <div style={{ padding: 12, color: C.textDim, fontSize: 11, textAlign: "center" }}>No spells yet</div>}
          </div>
        </div>

        {view === "editor" ? (
          <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
            <div style={{ flex: 1, overflowY: "auto", padding: 16 }}>

              {/* Identity */}
              <div style={css.section}>
                <div style={css.sectionTitle}><span>◆</span> Identity</div>
                <div style={css.row}><span style={css.label}>Name</span><input style={css.input} value={draft.name} onChange={(e) => up("name", e.target.value)} placeholder="Spell name..." /></div>
                <div style={css.row}><span style={css.label}>Flavor</span><input style={css.input} value={draft.flavor} onChange={(e) => up("flavor", e.target.value)} placeholder="Flavor text..." /></div>
                <div style={css.row}><span style={{ ...css.label, alignSelf: "flex-start", paddingTop: 4 }}>Notes</span><textarea style={{ ...css.input, minHeight: 60, resize: "vertical", fontFamily: "inherit", lineHeight: 1.4 }} value={draft.notes || ""} onChange={(e) => up("notes", e.target.value)} placeholder="Describe unique behaviors, special interactions, implementation notes..." /></div>
              </div>

              {/* Orbs */}
              <div style={css.section}>
                <div style={css.sectionTitle}><span>◆</span> Orbs</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {reg.elements.map((el) => {
                    const c = draft.orbs[el.id] || 0;
                    return (
                      <div key={el.id} style={{ display: "flex", alignItems: "center", gap: 4, padding: "4px 8px", borderRadius: 4, background: c > 0 ? el.color + "18" : C.surface2, border: "1px solid " + (c > 0 ? el.color + "50" : C.border) }}>
                        <span style={{ color: el.color, fontWeight: 700, fontSize: 12, minWidth: 14 }}>{el.id}</span>
                        <button style={{ ...css.btn, padding: "1px 6px", fontSize: 13, lineHeight: 1 }} onClick={() => upOrb(el.id, -1)}>−</button>
                        <span style={{ minWidth: 14, textAlign: "center", fontSize: 13, fontWeight: 600 }}>{c}</span>
                        <button style={{ ...css.btn, padding: "1px 6px", fontSize: 13, lineHeight: 1 }} onClick={() => upOrb(el.id, 1)}>+</button>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Targeter */}
              <div style={css.section}>
                <div style={css.sectionTitle}><span>◆</span> Targeter</div>
                <div style={css.row}><select style={{ ...css.select, flex: 1 }} value={draft.targeter} onChange={(e) => { up("targeter", e.target.value); up("targeterConfig", {}); }}>
                  {reg.targeters.map((t) => <option key={t.id} value={t.id}>{t.name} — {t.desc}</option>)}
                </select></div>
                {targeterDef && targeterDef.configFields && targeterDef.configFields.length > 0 && (
                  <div style={{ marginTop: 4 }}>{renderConfigFields(targeterDef.configFields, draft.targeterConfig || {}, upTargeterConfig, "targeter_" + draft.targeter)}</div>
                )}
                <SectionNote section="targeter" />
              </div>

              {/* Stencil */}
              <div style={css.section}>
                <div style={css.sectionTitle}><span>◆</span> Stencil
                  <label style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 4, cursor: "pointer", fontSize: 11, color: C.textDim, textTransform: "none", letterSpacing: 0, fontWeight: 400 }}>
                    <input type="checkbox" checked={draft.hasStencil} onChange={(e) => up("hasStencil", e.target.checked)} /> Enable
                  </label>
                </div>
                {draft.hasStencil && <div style={css.row}>
                  <span style={css.label}>Shape</span>
                  <select style={{ ...css.select, flex: 1 }} value={draft.stencilShape} onChange={(e) => up("stencilShape", e.target.value)}>
                    {reg.shapes.map((sh) => <option key={sh} value={sh}>{sh}</option>)}
                  </select>
                  <span style={css.label}>Scale</span>
                  <input style={{ ...css.input, width: 60 }} type="number" value={draft.stencilScale} onChange={(e) => up("stencilScale", e.target.value)} />
                </div>}
                <SectionNote section="stencil" />
              </div>

              {/* Selection */}
              <div style={css.section}>
                <div style={css.sectionTitle}><span>◆</span> Selection</div>
                <div style={css.row}><span style={css.label}>Strategy</span><select style={{ ...css.select, flex: 1 }} value={draft.selStrategy} onChange={(e) => { up("selStrategy", e.target.value); up("selConfig", {}); }}>
                  {reg.selections.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
                </select></div>
                {selDef && selDef.configFields && selDef.configFields.length > 0 && (
                  <div style={{ marginTop: 4 }}>{renderConfigFields(selDef.configFields, draft.selConfig || {}, upSelConfig, "sel_" + draft.selStrategy)}</div>
                )}
                <div style={{ marginTop: 8, fontSize: 11, color: C.textDim, marginBottom: 4 }}>Modifiers</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                  {reg.selMods.map((m) => {
                    const on = (draft.selMods || []).includes(m.id);
                    const hasFields = m.configFields && m.configFields.length > 0;
                    const modCfg = (draft.selModConfigs && draft.selModConfigs[m.id]) || {};
                    return (
                      <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 3 }}>
                        <button onClick={() => toggleMod(m.id)} style={{ ...css.btn, fontSize: 11, padding: "3px 8px", background: on ? C.accent + "25" : C.surface2, borderColor: on ? C.accent + "60" : C.border, color: on ? C.accent : C.textDim }}>{m.name}</button>
                        {on && hasFields && m.configFields.map((f) => (
                          f.type === "select" ? (
                            <select key={f.key} style={{ ...css.select, width: 90, padding: "3px 5px", fontSize: 11 }}
                              value={modCfg[f.key] || ""}
                              onChange={(e) => upSelModConfig(m.id, f.key, e.target.value)}>
                              <option value="">—</option>
                              {getFieldOptions(m.id, f.key, f.options).map((o) => <option key={o} value={o}>{o}</option>)}
                            </select>
                          ) : (
                            <input key={f.key} style={{ ...css.input, width: 40, padding: "3px 5px", fontSize: 11 }} placeholder={f.label || f.key}
                              value={modCfg[f.key] || ""}
                              onChange={(e) => upSelModConfig(m.id, f.key, e.target.value)} />
                          )
                        ))}
                      </div>
                    );
                  })}
                </div>
                <SectionNote section="selection" />
              </div>

              {/* Resolution */}
              <div style={css.section}>
                <div style={css.sectionTitle}><span>◆</span> Resolution</div>
                <div style={css.row}><select style={{ ...css.select, flex: 1 }} value={draft.resolution} onChange={(e) => { up("resolution", e.target.value); up("config", {}); }}>
                  {reg.resolutions.map((r) => <option key={r.id} value={r.id}>{r.name}</option>)}
                </select></div>
                {resDef && resDef.configFields && resDef.configFields.length > 0 && (
                  <div style={{ marginTop: 6 }}>
                    <div style={{ fontSize: 11, color: C.textDim, marginBottom: 4 }}>Config</div>
                    {renderConfigFields(resDef.configFields, draft.config || {}, upConfig, draft.resolution)}
                  </div>
                )}
                <SectionNote section="resolution" />
              </div>

              {/* Keywords */}
              <div style={css.section}>
                <div style={css.sectionTitle}><span>◆</span> Keywords <button style={{ ...css.btn, marginLeft: "auto", fontSize: 11, padding: "2px 8px" }} onClick={addKeyword}>+ Add</button></div>
                {(draft.keywords || []).map((kw, i) => {
                  const kwDef = reg.keywords.find((k) => k.id === kw._keyword_type);
                  return (
                    <div key={i} style={{ marginBottom: 8, padding: 8, background: C.surface2, borderRadius: 4, border: "1px solid " + C.border }}>
                      <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 4 }}>
                        <select style={{ ...css.select, fontSize: 12, fontWeight: 600 }} value={kw._keyword_type} onChange={(e) => upKeyword(i, "_keyword_type", e.target.value)} onKeyDown={(e) => e.stopPropagation()}>
                          {reg.keywords.map((k) => <option key={k.id} value={k.id}>{k.id}</option>)}
                        </select>
                        <div style={{ flex: 1 }} />
                        <span style={{ fontSize: 11, color: C.textDim }}>Tick</span>
                        <input style={{ ...css.input, width: 35, padding: "2px 5px", fontSize: 11 }} placeholder="—" value={kw.tick || ""} onChange={(e) => upKeyword(i, "tick", e.target.value)} onKeyDown={(e) => e.stopPropagation()} onClick={(e) => e.stopPropagation()} />
                        <span style={{ fontSize: 11, color: C.textDim }}>Chance</span>
                        <input style={{ ...css.input, width: 50, padding: "2px 5px", fontSize: 11 }} placeholder="—" value={kw.chance || ""} onChange={(e) => upKeyword(i, "chance", e.target.value)} onKeyDown={(e) => e.stopPropagation()} onClick={(e) => e.stopPropagation()} />
                        <button style={css.btnDanger} onClick={() => removeKeyword(i)}>×</button>
                      </div>
                      {kwDef && kwDef.configFields && renderConfigFields(
                        kwDef.configFields,
                        kw.config || {},
                        (key, val) => upKeyword(i, key, val),
                        kw._keyword_type
                      )}
                    </div>
                  );
                })}
                {(!draft.keywords || draft.keywords.length === 0) && <div style={{ color: C.textDim, fontSize: 11 }}>No keywords added</div>}
                <SectionNote section="keywords" />
              </div>

              {/* Excess */}
              <div style={css.section}>
                <div style={css.sectionTitle}><span>◆</span> Excess <button style={{ ...css.btn, marginLeft: "auto", fontSize: 11, padding: "2px 8px" }} onClick={addExcess}>+ Add</button></div>
                {(draft.excess || []).map((ex, ei) => (
                  <div key={ei} style={{ marginBottom: 8, padding: 8, background: C.surface2, borderRadius: 4, border: "1px solid " + C.border }}>
                    <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 6 }}>
                      <select style={{ ...css.select, width: 60, fontWeight: 700 }} value={ex.element} onChange={(e) => upExcess(ei, "element", e.target.value)}>
                        {reg.elements.map((el) => <option key={el.id} value={el.id}>{el.id}</option>)}
                      </select>
                      <div style={{ flex: 1 }} />
                      <button style={{ ...css.btn, fontSize: 11, padding: "2px 6px" }} onClick={() => addExcessOp(ei)}>+ op</button>
                      <button style={css.btnDanger} onClick={() => removeExcess(ei)}>×</button>
                    </div>
                    {(ex.ops || []).map((op, oi) => {
                      // Build target options from spell's keywords + config
                      const targetOpts = [];
                      (draft.keywords || []).forEach((kw) => {
                        const kwDef = reg.keywords.find((k) => k.id === kw._keyword_type);
                        if (kwDef && kwDef.configFields) kwDef.configFields.forEach((f) => {
                          const t = kw._keyword_type + "." + f.key;
                          if (!targetOpts.includes(t)) targetOpts.push(t);
                        });
                      });
                      if (resDef) resDef.configFields.forEach((f) => {
                        targetOpts.push("config." + f.key);
                      });
                      return (
                      <div key={oi} style={{ display: "flex", gap: 4, alignItems: "center", marginBottom: 3 }}>
                        <select style={{ ...css.select, width: 60, fontSize: 11 }} value={op.op} onChange={(e) => upExcessOp(ei, oi, "op", e.target.value)}>
                          {EXCESS_OPS.map((o) => <option key={o} value={o}>{o}</option>)}
                        </select>
                        <select style={{ ...css.select, flex: 1, fontSize: 11 }} value={op.target} onChange={(e) => upExcessOp(ei, oi, "target", e.target.value)}>
                          <option value="">— Select target —</option>
                          {targetOpts.map((t) => <option key={t} value={t}>{t}</option>)}
                        </select>
                        <input style={{ ...css.input, width: 50, fontSize: 11, padding: "3px 6px" }} placeholder="2" value={op.scalar} onChange={(e) => upExcessOp(ei, oi, "scalar", e.target.value)} />
                        <button style={{ ...css.btnDanger, fontSize: 12, padding: "0 4px" }} onClick={() => removeExcessOp(ei, oi)}>×</button>
                      </div>
                      );
                    })}
                  </div>
                ))}
                {(!draft.excess || draft.excess.length === 0) && <div style={{ color: C.textDim, fontSize: 11 }}>No excess rules</div>}
                <SectionNote section="excess" />
              </div>

              <div style={{ display: "flex", gap: 8, marginBottom: 40 }}>
                <button style={{ ...css.btnAccent, padding: "8px 24px", fontSize: 13 }} onClick={saveSpell}>
                  {spells.some((s) => s.id === draft.id) ? "Update Spell" : "Save Spell"}
                </button>
                <button style={css.btn} onClick={() => { navigator.clipboard.writeText(yaml); flash("Copied!"); }}>Copy This YAML</button>
              </div>
            </div>

            {/* YAML Preview */}
            <div style={{ width: 320, background: C.surface, borderLeft: "1px solid " + C.border, display: "flex", flexDirection: "column", flexShrink: 0 }}>
              <div style={{ padding: "8px 12px", borderBottom: "1px solid " + C.border, fontSize: 11, fontWeight: 700, color: C.accent, textTransform: "uppercase", letterSpacing: "0.08em" }}>YAML Preview</div>
              <pre style={{ flex: 1, overflowY: "auto", padding: 12, margin: 0, fontFamily: "'Cascadia Code', 'Fira Code', monospace", fontSize: 11.5, lineHeight: 1.6, color: C.text, whiteSpace: "pre-wrap", wordBreak: "break-word" }}>{yaml}</pre>
            </div>
          </div>
        ) : (
          /* Registry */
          <div style={{ flex: 1, overflowY: "auto", padding: 16 }}>
            <div style={{ display: "flex", gap: 4, marginBottom: 16, flexWrap: "wrap" }}>
              {["elements", "targeters", "selections", "selMods", "resolutions", "keywords", "shapes"].map((tab) => (
                <button key={tab} onClick={() => setRegTab(tab)} style={{ ...css.btn, fontSize: 11, padding: "5px 10px", background: regTab === tab ? C.surface3 : "transparent", borderColor: regTab === tab ? C.borderLight : "transparent", textTransform: "capitalize" }}>
                  {tab === "selMods" ? "Sel. Modifiers" : tab}
                </button>
              ))}
            </div>
            <div style={css.section}>
              <div style={css.sectionTitle}><span>◆</span> {regTab === "selMods" ? "Selection Modifiers" : regTab}</div>
              {(regTab === "shapes" ? reg.shapes : reg[regTab]).map((item, i) => {
                const id = regTab === "shapes" ? item : item.id;
                const expandable = ["targeters", "selections", "selMods", "resolutions", "keywords"].includes(regTab);
                const isExpanded = expandable && expandedRes === (regTab + ":" + id);
                const hasConfigFields = expandable && item.configFields && item.configFields.length > 0;

                return <div key={id || i} style={{ marginBottom: 4 }}>
                  <div style={{ ...css.row, padding: "4px 8px", background: C.surface2, borderRadius: isExpanded ? "4px 4px 0 0" : 4, marginBottom: 0, cursor: expandable ? "pointer" : "default" }}
                    onClick={() => expandable && setExpandedRes(isExpanded ? null : (regTab + ":" + id))}>
                    {regTab === "shapes" ? (
                      <span style={{ flex: 1 }}>{item}</span>
                    ) : (
                      <>
                        {expandable && <span style={{ fontSize: 10, color: C.textDim, marginRight: 2 }}>{isExpanded ? "▾" : "▸"}</span>}
                        <span style={{ fontWeight: 600, color: item.color || C.text, minWidth: 80 }}>{item.id}</span>
                        <span style={{ flex: 1, color: C.textDim, fontSize: 11 }}>
                          {item.name || ""} {item.desc ? "— " + item.desc : ""}
                          {item.configFields && item.configFields.length > 0 && " (" + item.configFields.map((f) => f.key).join(", ") + ")"}
                        </span>
                      </>
                    )}
                    <button style={css.btnDanger} onClick={(e) => { e.stopPropagation(); removeRegItem(regTab, id); }}>×</button>
                  </div>

                  {/* Expanded config fields */}
                  {isExpanded && (
                    <div style={{ padding: "8px 12px", background: C.surface3, borderRadius: "0 0 4px 4px", border: "1px solid " + C.border, borderTop: "none" }}>

                      {!hasConfigFields && <div style={{ fontSize: 11, color: C.textDim, marginBottom: 8 }}>No config fields yet</div>}

                      {/* Field list */}
                      {hasConfigFields && orderFields(item.configFields).map((f) => {
                        const fieldId = id + ":" + f.key;
                        const isFieldOpen = expandedField === fieldId;
                        const isEditing = editingField === fieldId;
                        const isSelect = f.type === "select";
                        const allOpts = isSelect ? getFieldOptions(id, f.key, f.options) : [];
                        const customOpts = isSelect ? objKeys((configOpts[id] && configOpts[id][f.key]) || {}) : [];
                        const hasParent = f.showWhen && f.showWhen.key;
                        const isDef = isDefaultField(id, f.key);
                        const isOverridden = isFieldOverridden(id, f.key);
                        const depth = getFieldDepth(f, item.configFields);

                        return (
                          <div key={f.key} style={{ marginLeft: depth * 16, marginBottom: 3 }}>
                            {/* Field header row */}
                            <div style={{
                              display: "flex", alignItems: "center", gap: 5, padding: "4px 8px",
                              background: C.surface2, borderRadius: isFieldOpen || isEditing ? "3px 3px 0 0" : 3, fontSize: 11,
                              cursor: "pointer",
                            }} onClick={() => { setExpandedField(isFieldOpen ? null : fieldId); setEditingField(null); }}>
                              <span style={{ fontSize: 9, color: C.textDim }}>{isFieldOpen ? "▾" : "▸"}</span>
                              {hasParent && <span style={{ fontSize: 9, color: C.accent }}>↳</span>}
                              <span style={{ fontWeight: 600, color: C.text, minWidth: 55 }}>{f.key}</span>
                              <span style={{ color: C.textDim }}>{f.label || ""}</span>
                              <span style={{ color: C.accent, fontSize: 10, padding: "1px 4px", background: C.accent + "15", borderRadius: 2 }}>{f.type}</span>
                              {isSelect && !isFieldOpen && <span style={{ color: C.textDim, fontSize: 10 }}>[{allOpts.join(", ")}]</span>}
                              {hasParent && !isFieldOpen && <span style={{ color: C.textDim, fontSize: 10 }}>if {f.showWhen.key}={f.showWhen.value}</span>}
                              {isOverridden && <span style={{ color: C.accent, fontSize: 9 }}>edited</span>}
                              <div style={{ flex: 1 }} />
                              <button style={{ ...css.btn, fontSize: 10, padding: "1px 5px" }} onClick={(e) => {
                                e.stopPropagation();
                                if (isEditing) { setEditingField(null); } else {
                                  setEditingField(fieldId); setExpandedField(fieldId);
                                  setEditFieldData((p) => ({ ...p, [fieldId]: { label: f.label || "", type: f.type, showWhenKey: (f.showWhen && f.showWhen.key) || "", showWhenValue: (f.showWhen && f.showWhen.value) || "" } }));
                                }
                              }}>{isEditing ? "Done" : "Edit"}</button>
                              <button style={{ ...css.btnDanger, fontSize: 11, padding: "0 3px" }} onClick={(e) => { e.stopPropagation(); removeField(id, f.key, isDef && !isOverridden); }}>×</button>
                            </div>

                            {/* Expanded field content */}
                            {isFieldOpen && (
                              <div style={{ padding: "6px 8px", background: C.surface2, borderRadius: "0 0 3px 3px", borderTop: "1px solid " + C.border }}>

                                {/* Edit form */}
                                {isEditing && (() => {
                                  const ed = editFieldData[fieldId] || {};
                                  const siblingFields = item.configFields.filter((sf) => sf.key !== f.key);
                                  return (
                                    <div style={{ marginBottom: 8, padding: 6, background: C.surface, borderRadius: 3, border: "1px solid " + C.border }}>
                                      <div style={{ display: "flex", gap: 4, marginBottom: 4, alignItems: "center" }}>
                                        <span style={{ fontSize: 10, color: C.textDim, minWidth: 35 }}>Label</span>
                                        <input style={{ ...css.input, flex: 1, fontSize: 11, padding: "2px 5px" }} value={ed.label || ""} onChange={(e) => setEditFieldData((p) => ({ ...p, [fieldId]: { ...p[fieldId], label: e.target.value } }))} />
                                        <span style={{ fontSize: 10, color: C.textDim, minWidth: 28 }}>Type</span>
                                        <select style={{ ...css.select, width: 80, fontSize: 11, padding: "2px 3px" }} value={ed.type || "number"} onChange={(e) => setEditFieldData((p) => ({ ...p, [fieldId]: { ...p[fieldId], type: e.target.value } }))}>
                                          {FIELD_TYPES.map((t) => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                      </div>
                                      <div style={{ display: "flex", gap: 4, marginBottom: 4, alignItems: "center" }}>
                                        <span style={{ fontSize: 10, color: C.textDim, minWidth: 35 }}>Show if</span>
                                        <select style={{ ...css.select, flex: 1, fontSize: 11, padding: "2px 3px" }} value={ed.showWhenKey || ""} onChange={(e) => setEditFieldData((p) => ({ ...p, [fieldId]: { ...p[fieldId], showWhenKey: e.target.value } }))}>
                                          <option value="">Always visible</option>
                                          {siblingFields.map((sf) => <option key={sf.key} value={sf.key}>{sf.key} ({sf.label})</option>)}
                                        </select>
                                        {ed.showWhenKey && (
                                          <>
                                            <span style={{ fontSize: 10, color: C.textDim }}>=</span>
                                            <input style={{ ...css.input, width: 70, fontSize: 11, padding: "2px 5px" }} placeholder="Value" value={ed.showWhenValue || ""} onChange={(e) => setEditFieldData((p) => ({ ...p, [fieldId]: { ...p[fieldId], showWhenValue: e.target.value } }))} />
                                          </>
                                        )}
                                      </div>
                                      <button style={{ ...css.btnAccent, fontSize: 10, padding: "3px 10px" }} onClick={() => {
                                        const upd = { ...f, label: capitalize(ed.label || f.key), type: ed.type || f.type };
                                        if (ed.showWhenKey) upd.showWhen = { key: ed.showWhenKey, value: ed.showWhenValue || "true" };
                                        else delete upd.showWhen;
                                        if (ed.type === "select" && !upd.options) upd.options = [];
                                        editField(id, f.key, upd);
                                        setEditingField(null);
                                      }}>Save Changes</button>
                                      {isOverridden && isDef && <button style={{ ...css.btn, fontSize: 10, padding: "3px 8px", marginLeft: 4 }} onClick={() => { fbRemove("spellforge/customFields/" + id + "/" + f.key); setEditingField(null); flash("Reset to default!"); }}>Reset</button>}
                                    </div>
                                  );
                                })()}

                                {/* Select options */}
                                {isSelect && (
                                  <>
                                    <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 6 }}>
                                      {allOpts.map((opt) => (
                                        <div key={opt} style={{ display: "flex", alignItems: "center", gap: 3, padding: "3px 8px", background: C.surface, borderRadius: 3, border: "1px solid " + C.border, fontSize: 11, color: C.text }}>
                                          <span>{opt}</span>
                                          {customOpts.includes(opt) && <button style={{ ...css.btnDanger, fontSize: 11, padding: "0 3px" }} onClick={() => removeConfigOption(id, f.key, opt)}>×</button>}
                                        </div>
                                      ))}
                                    </div>
                                    <div style={{ display: "flex", gap: 4 }}>
                                      <input style={{ ...css.input, flex: 1, fontSize: 11, padding: "3px 6px" }}
                                        placeholder={"New " + (f.label || f.key).toLowerCase() + " option..."}
                                        value={(newOptInput[fieldId]) || ""}
                                        onChange={(e) => setNewOptInput((p) => ({ ...p, [fieldId]: e.target.value }))}
                                        onKeyDown={(e) => { if (e.key === "Enter") { addConfigOption(id, f.key, newOptInput[fieldId]); setNewOptInput((p) => ({ ...p, [fieldId]: "" })); } }}
                                      />
                                      <button style={{ ...css.btn, fontSize: 11, padding: "3px 8px" }} onClick={() => { addConfigOption(id, f.key, newOptInput[fieldId]); setNewOptInput((p) => ({ ...p, [fieldId]: "" })); }}>+ Add</button>
                                    </div>
                                  </>
                                )}

                                {!isSelect && !isEditing && <div style={{ fontSize: 11, color: C.textDim }}>Click Edit to modify this field</div>}
                              </div>
                            )}
                          </div>
                        );
                      })}

                      {/* Removed fields restore */}
                      {getRemovedFieldsForItem(id).length > 0 && (
                        <div style={{ marginTop: 6, padding: "4px 8px", background: C.danger + "08", borderRadius: 3, border: "1px solid " + C.danger + "20" }}>
                          <div style={{ fontSize: 10, color: C.textDim, marginBottom: 4 }}>Removed fields:</div>
                          {getRemovedFieldsForItem(id).map((fk) => (
                            <div key={fk} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, marginBottom: 2 }}>
                              <span style={{ color: C.textDim, textDecoration: "line-through" }}>{fk}</span>
                              <button style={{ ...css.btn, fontSize: 10, padding: "1px 6px", color: C.success, borderColor: C.success + "40" }} onClick={() => restoreField(id, fk)}>Restore</button>
                            </div>
                          ))}
                        </div>
                      )}

                      {/* Add new field */}
                      <div style={{ marginTop: 8, padding: 8, border: "1px dashed " + C.border, borderRadius: 4 }}>
                        <div style={{ fontSize: 11, color: C.textDim, marginBottom: 6 }}>Add Field</div>
                        <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                          <input style={{ ...css.input, width: 80, fontSize: 11, padding: "3px 6px" }}
                            placeholder="Key"
                            value={(newFieldInput[id] && newFieldInput[id].key) || ""}
                            onChange={(e) => setNewFieldInput((p) => ({ ...p, [id]: { ...p[id], key: e.target.value } }))}
                          />
                          <input style={{ ...css.input, flex: 1, fontSize: 11, padding: "3px 6px" }}
                            placeholder="Label"
                            value={(newFieldInput[id] && newFieldInput[id].label) || ""}
                            onChange={(e) => setNewFieldInput((p) => ({ ...p, [id]: { ...p[id], label: e.target.value } }))}
                          />
                          <select style={{ ...css.select, width: 90, fontSize: 11, padding: "3px 4px" }}
                            value={(newFieldInput[id] && newFieldInput[id].type) || "number"}
                            onChange={(e) => setNewFieldInput((p) => ({ ...p, [id]: { ...p[id], type: e.target.value } }))}
                          >
                            {FIELD_TYPES.map((t) => <option key={t} value={t}>{t}</option>)}
                          </select>
                          <button style={{ ...css.btn, fontSize: 11, padding: "3px 8px" }} onClick={() => {
                            const fi = newFieldInput[id] || {};
                            if (!fi.key) return;
                            addCustomField(id, {
                              key: fi.key.toLowerCase().replace(/\s+/g, "_"),
                              label: capitalize(fi.label || fi.key),
                              type: fi.type || "number",
                              ...(fi.type === "select" ? { options: [] } : {}),
                            });
                            setNewFieldInput((p) => ({ ...p, [id]: {} }));
                          }}>+ Add</button>
                        </div>
                      </div>
                    </div>
                  )}
                </div>;
              })}

              {/* Removed defaults - restore section */}
              {getRemovedItems(regTab).length > 0 && (
                <div style={{ marginTop: 8 }}>
                  <button onClick={() => setShowRemoved(!showRemoved)} style={{ ...css.btn, fontSize: 11, padding: "3px 8px", color: C.textDim, width: "100%" }}>
                    {showRemoved ? "▾" : "▸"} {getRemovedItems(regTab).length} removed — click to {showRemoved ? "hide" : "restore"}
                  </button>
                  {showRemoved && getRemovedItems(regTab).map((item, i) => {
                    const id = regTab === "shapes" ? item : item.id;
                    return <div key={id || i} style={{ ...css.row, padding: "4px 8px", background: C.danger + "10", borderRadius: 4, marginBottom: 4, marginTop: 4, border: "1px solid " + C.danger + "25" }}>
                      {regTab === "shapes" ? (
                        <span style={{ flex: 1, color: C.textDim, textDecoration: "line-through" }}>{item}</span>
                      ) : (
                        <>
                          <span style={{ fontWeight: 600, color: C.textDim, minWidth: 80, textDecoration: "line-through" }}>{item.id}</span>
                          <span style={{ flex: 1, color: C.textDim, fontSize: 11, textDecoration: "line-through" }}>{item.name || ""}</span>
                        </>
                      )}
                      <button style={{ ...css.btn, fontSize: 11, padding: "2px 8px", color: C.success, borderColor: C.success + "40" }} onClick={() => restoreDefault(regTab, id)}>Restore</button>
                    </div>;
                  })}
                </div>
              )}

              <div style={{ marginTop: 12, padding: 10, border: "1px dashed " + C.border, borderRadius: 4 }}>
                <div style={{ fontSize: 11, color: C.textDim, marginBottom: 6 }}>Add New</div>
                {regTab === "shapes" ? (
                  <div style={css.row}>
                    <input style={{ ...css.input, flex: 1 }} placeholder="Shape name..." value={(regForm.shapes && regForm.shapes.id) || ""} onChange={(e) => setRegForm((f) => ({ ...f, shapes: { id: e.target.value } }))} />
                    <button style={css.btn} onClick={() => { addShape(regForm.shapes?.id); setRegForm((f) => ({ ...f, shapes: {} })); flash("Added!"); }}>Add</button>
                  </div>
                ) : regTab === "elements" ? (
                  <div style={css.row}>
                    <input style={{ ...css.input, width: 60 }} placeholder="ID" value={(regForm.elements && regForm.elements.id) || ""} onChange={(e) => setRegForm((f) => ({ ...f, elements: { ...f.elements, id: e.target.value } }))} />
                    <input style={{ ...css.input, flex: 1 }} placeholder="Name" value={(regForm.elements && regForm.elements.name) || ""} onChange={(e) => setRegForm((f) => ({ ...f, elements: { ...f.elements, name: e.target.value } }))} />
                    <input style={{ ...css.input, width: 50 }} type="color" value={(regForm.elements && regForm.elements.color) || "#888888"} onChange={(e) => setRegForm((f) => ({ ...f, elements: { ...f.elements, color: e.target.value } }))} />
                    <button style={css.btn} onClick={() => addRegItem("elements")}>Add</button>
                  </div>
                ) : (
                  <>
                    <div style={css.row}>
                      <input style={{ ...css.input, width: 100 }} placeholder="ID" value={(regForm[regTab] && regForm[regTab].id) || ""} onChange={(e) => setRegForm((f) => ({ ...f, [regTab]: { ...f[regTab], id: e.target.value } }))} />
                      <input style={{ ...css.input, flex: 1 }} placeholder="Name" value={(regForm[regTab] && regForm[regTab].name) || ""} onChange={(e) => setRegForm((f) => ({ ...f, [regTab]: { ...f[regTab], name: e.target.value } }))} />
                    </div>
                    {(regTab === "targeters" || regTab === "selections" || regTab === "selMods" || regTab === "resolutions") && <div style={css.row}><input style={{ ...css.input, flex: 1 }} placeholder="Description" value={(regForm[regTab] && regForm[regTab].desc) || ""} onChange={(e) => setRegForm((f) => ({ ...f, [regTab]: { ...f[regTab], desc: e.target.value } }))} /></div>}
                    {(regTab === "targeters" || regTab === "selections" || regTab === "selMods" || regTab === "resolutions" || regTab === "keywords") && <div style={css.row}><input style={{ ...css.input, flex: 1 }} placeholder={regTab === "keywords" ? "Params (comma-separated, e.g. amount,type)" : "Initial fields (optional, comma-separated — or add later via expand)"} value={(regForm[regTab] && regForm[regTab].paramStr) || ""} onChange={(e) => setRegForm((f) => ({ ...f, [regTab]: { ...f[regTab], paramStr: e.target.value } }))} /></div>}
                    <button style={{ ...css.btn, marginTop: 6 }} onClick={() => addRegItem(regTab)}>Add</button>
                  </>
                )}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<SpellForge />);
  </script>
</body>
</html>
